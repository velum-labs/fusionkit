name: Release fusionkit to PyPI

on:
  # Publishing is gated behind a published GitHub Release (not a bare tag push).
  # The release tag must match fusionkit-v* (enforced in "Validate release tag").
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and validate distributions without publishing"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: pypi-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: build, validate, and publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only the canonical repository may publish.
    if: github.repository == 'velum-labs/fusionkit'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate release tag
        if: github.event_name == 'release'
        run: |
          case "${{ github.event.release.tag_name }}" in
            fusionkit-v*) echo "release tag ${{ github.event.release.tag_name }} ok" ;;
            *) echo "release tag must match fusionkit-v*"; exit 1 ;;
          esac

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Lockfile is current
        run: uv lock --check

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Lint and type-check
        run: |
          uv run ruff check .
          uv run pyright

      - name: Test
        run: uv run pytest

      - name: Build all distributions
        run: |
          rm -rf dist
          uv build --all-packages

      - name: Validate distribution metadata
        run: uv run --with twine python -m twine check dist/*

      - name: Publish to PyPI (Trusted Publishing)
        # Real publish only on a published GitHub Release; workflow_dispatch is
        # build/validate only.
        if: github.event_name == 'release'
        run: uv publish --trusted-publishing always
